<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, height=1080, user-scalable=no" />
  <title>Airtek TV</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Pantalla de carga -->
  <div id="splash" class="splash">
    <div class="splash-glow"></div>
    <img class="splash-logo" src="img/airtek_logo.png" alt="Airtek TV" />
    <div class="splash-bar"><span></span></div>
    <div class="splash-status" id="splash-status">Cargando canales…</div>
  </div>

  <!-- Navegador de canales -->
  <main id="browse" class="browse hidden">
    <aside class="rail" id="rail" aria-label="Categorías">
      <img class="rail-logo" src="img/airtek_logo.png" alt="Airtek TV" />
      <nav class="rail-cats" id="rail-cats"></nav>
      <div class="rail-foot">
        <div class="clock" id="clock">--:--</div>
        <div class="clock-date" id="clock-date"></div>
      </div>
    </aside>

    <section class="content">
      <header class="content-head">
        <div>
          <h1 id="cat-title">Airtek TV</h1>
          <span id="cat-count" class="cat-count"></span>
        </div>
      </header>
      <div class="grid" id="grid" tabindex="-1"></div>
    </section>
  </main>

  <!-- Reproductor a pantalla completa -->
  <div id="player" class="player hidden">
    <video id="video" autoplay playsinline></video>
    <div class="player-scrim"></div>
    <div class="player-osd" id="osd">
      <div class="osd-num" id="osd-num"></div>
      <div class="osd-info">
        <div class="osd-now" id="osd-now"></div>
        <div class="osd-meta"><span class="osd-live" id="osd-state"></span><span class="osd-cat" id="osd-cat"></span></div>
      </div>
      <div class="osd-hint">OK / Atrás · ◄ ► cambia de canal</div>
    </div>
    <div class="player-spinner" id="player-spinner"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
