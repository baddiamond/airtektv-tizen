<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, height=1080, user-scalable=no" />
  <title>Airtek TV</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ============ BOOT ============ -->
<div id="boot" class="view">
  <div style="position:absolute;inset:-12%;background:radial-gradient(46% 60% at 30% 28%,rgba(30,123,230,.28),transparent 60%),radial-gradient(50% 55% at 72% 70%,rgba(49,207,255,.22),transparent 62%),radial-gradient(60% 70% at 50% 50%,rgba(11,28,52,.6),transparent 70%);animation:atk-bgpan 9s ease-in-out infinite"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(60% 60% at 50% 50%,transparent 40%,rgba(4,7,13,.85) 100%)"></div>
  <div id="boot-fibers" style="position:absolute;inset:0;overflow:hidden"></div>

  <div style="position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center">
    <div style="position:absolute;left:50%;top:36%;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(180,240,255,.95),rgba(30,123,230,.4) 45%,transparent 70%);animation:atk-flash .9s ease-out 1.35s both"></div>
    <div style="position:absolute;left:50%;top:36%;width:120px;height:120px;border-radius:50%;border:2px solid rgba(120,220,255,.8);animation:atk-ring 1.1s ease-out 1.42s both"></div>
    <div style="position:absolute;left:50%;top:36%;width:120px;height:120px;border-radius:50%;border:1px solid rgba(30,123,230,.7);animation:atk-ring 1.3s ease-out 1.55s both"></div>
    <div id="boot-sparks"></div>
    <div style="animation:atk-ignite .95s cubic-bezier(.2,.7,.2,1) 1.45s both;text-align:center">
      <div style="animation:atk-glowpulse 2.6s ease-in-out 2.3s infinite">
        <img src="assets/airtek-logo.svg" alt="Airtek TV" style="display:block;width:460px;height:auto;margin:0 auto" />
        <div style="height:4px;width:300px;margin:24px auto 0;border-radius:4px;background:linear-gradient(90deg,#31cfff,#1e7be6);transform-origin:left center;animation:atk-underline .7s cubic-bezier(.2,.7,.2,1) 2.05s both;box-shadow:0 0 16px rgba(49,207,255,.6)"></div>
      </div>
    </div>
    <div class="nun" style="margin-top:26px;font-weight:800;letter-spacing:6px;font-size:15px;color:#9fc7e6;text-transform:uppercase;animation:atk-up .7s ease-out 2.35s both">Evoluciona a un mundo sin límites</div>
  </div>

  <div style="position:absolute;left:0;right:0;bottom:96px;display:flex;flex-direction:column;align-items:center;gap:16px;animation:atk-up .8s ease-out .35s both">
    <div style="width:380px;height:4px;border-radius:4px;background:rgba(120,180,230,.14);overflow:hidden">
      <div style="height:100%;border-radius:4px;background:linear-gradient(90deg,#31cfff,#7fe6ff,#1e7be6);box-shadow:0 0 14px rgba(49,207,255,.7);animation:atk-fill 4.2s cubic-bezier(.45,.05,.25,1) .3s both"></div>
    </div>
    <div class="nun" style="display:flex;align-items:center;gap:10px;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#6f93b3;font-weight:700">
      <span style="width:7px;height:7px;border-radius:50%;background:#31cfff;box-shadow:0 0 10px #31cfff;animation:atk-blink 1.1s ease-in-out infinite"></span>
      Iniciando Ultravelocidad
    </div>
  </div>

  <div style="position:absolute;left:0;right:0;bottom:40px;display:flex;align-items:center;justify-content:center;gap:12px;animation:atk-up .8s ease-out 2.6s both">
    <span class="nun" style="min-width:42px;height:38px;padding:0 13px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:linear-gradient(180deg,#1c2a44,#0d1626);border:1px solid rgba(49,207,255,.4);font-weight:900;font-size:15px;color:#dff4ff;animation:atk-kbpulse 1.8s ease-in-out infinite;box-shadow:0 3px 0 rgba(0,0,0,.5),inset 0 1px 0 rgba(120,180,230,.18)">OK</span>
    <span style="font-size:14px;letter-spacing:1px;color:#7c9bb8;font-weight:600">Presiona OK para entrar</span>
  </div>
</div>

<!-- ============ HOME ============ -->
<div id="home" class="view hidden">
  <div style="position:absolute;inset:0;background:radial-gradient(75% 80% at 14% 0%,rgba(30,123,230,.14),transparent 55%),radial-gradient(60% 70% at 100% 100%,rgba(49,207,255,.08),transparent 60%),#06090f"></div>
  <div style="position:absolute;inset:0;display:flex">
    <!-- SIDEBAR -->
    <div style="position:relative;width:300px;flex:none;padding:40px 0 26px;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(8,14,24,.96),rgba(5,9,15,.94));border-right:1px solid rgba(56,98,140,.16)">
      <div style="padding:0 38px 34px"><img src="assets/airtek-logo.svg" alt="Airtek TV" style="display:block;width:182px;height:auto" /></div>
      <div id="cats" style="flex:1;display:flex;flex-direction:column;gap:3px;padding:0 18px;overflow:hidden"></div>
      <div style="padding:22px 38px 0;margin-top:10px;border-top:1px solid rgba(56,98,140,.14)">
        <div id="clock" class="nun" style="font-weight:900;font-size:40px;line-height:1;letter-spacing:.5px;color:#eaf6ff">--:--</div>
        <div id="clock-date" style="margin-top:5px;font-size:13px;color:#6f93b3;text-transform:capitalize;font-weight:600"></div>
      </div>
    </div>
    <!-- CONTENT -->
    <div style="position:relative;flex:1;display:flex;flex-direction:column;padding:38px 52px 0;overflow:hidden">
      <div style="flex:none;display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:baseline;gap:18px">
          <div id="cat-title" class="nun" style="font-weight:900;font-size:46px;line-height:.95;letter-spacing:-.5px;color:#f5fcff">Airtek TV</div>
          <div style="font-size:16px;color:#7fa6c4;font-weight:600"><span id="cat-count" class="nun" style="color:#31cfff;font-weight:800">0</span> canales</div>
        </div>
      </div>
      <div id="spotlight" style="flex:none;display:flex;gap:30px;align-items:stretch;height:236px;margin-top:24px"></div>
      <div id="grid-scroll" style="position:relative;flex:1;overflow:hidden;margin:14px -30px 0;padding:16px 30px 0">
        <div id="grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:26px;padding-bottom:26px"></div>
        <div style="position:absolute;left:0;right:0;bottom:0;height:34px;background:linear-gradient(transparent,#06090f);pointer-events:none"></div>
      </div>
      <div style="flex:none;height:74px;display:flex;align-items:center;justify-content:space-between;padding:0 4px;border-top:1px solid rgba(56,98,140,.16)">
        <div style="display:flex;align-items:center;gap:26px">
          <div style="display:flex;align-items:center;gap:9px"><span class="nun" style="min-width:34px;height:34px;padding:0 9px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;background:linear-gradient(180deg,#1a2740,#0e1626);border:1px solid rgba(90,140,190,.3);box-shadow:0 3px 0 rgba(0,0,0,.5),inset 0 1px 0 rgba(120,180,230,.16);font-weight:900;font-size:15px;color:#cfe6f7">⇅</span><span style="font-size:14px;color:#8fb0cc;font-weight:600">Navegar</span></div>
          <div style="display:flex;align-items:center;gap:9px"><span class="nun" style="min-width:34px;height:34px;padding:0 11px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;background:linear-gradient(180deg,#13314f,#0b2036);border:1px solid rgba(49,207,255,.4);box-shadow:0 3px 0 rgba(0,0,0,.5),inset 0 1px 0 rgba(120,180,230,.16);font-weight:900;font-size:14px;color:#dff4ff">OK</span><span style="font-size:14px;color:#8fb0cc;font-weight:600">Ver canal</span></div>
          <div style="display:flex;align-items:center;gap:9px"><span class="nun" style="min-width:34px;height:34px;padding:0 11px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;background:linear-gradient(180deg,#1a2740,#0e1626);border:1px solid rgba(90,140,190,.3);box-shadow:0 3px 0 rgba(0,0,0,.5),inset 0 1px 0 rgba(120,180,230,.16);font-weight:900;font-size:15px;color:#cfe6f7">↩</span><span style="font-size:14px;color:#8fb0cc;font-weight:600">Atrás</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 14px;border-radius:999px;background:rgba(14,24,38,.7);border:1px solid rgba(56,98,140,.22)">
          <span style="font-size:12.5px;color:#7c9bb8;font-weight:700;letter-spacing:.3px">Samsung Smart Remote</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============ PLAYER ============ -->
<div id="player" class="view hidden" style="background:#000">
  <div id="pl-backdrop" style="position:absolute;inset:0"></div>
  <object id="av" type="application/avplayer" style="position:absolute;inset:0;width:100%;height:100%;background:transparent;z-index:0;display:none"></object>
  <video id="video" autoplay playsinline></video>
  <div style="position:absolute;inset:0;background:radial-gradient(80% 90% at 50% 40%,transparent,rgba(0,0,0,.55) 100%);z-index:2;pointer-events:none"></div>
  <div id="pl-spinner" class="pl-spinner hidden"></div>

  <div id="pl-top" style="position:absolute;top:34px;right:40px;display:flex;align-items:center;gap:14px;z-index:4">
    <div style="display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:999px;background:rgba(4,7,13,.55);border:1px solid rgba(120,160,200,.25)"><span style="width:9px;height:9px;border-radius:50%;background:#33d17a;box-shadow:0 0 10px #33d17a"></span><span class="nun" style="font-weight:900;font-size:13px;letter-spacing:2px;color:#dff4ff">VIVO</span></div>
    <span id="pl-corner" class="nun" style="font-weight:800;font-size:22px;color:#fff;opacity:.92"></span>
  </div>

  <div id="pl-banner" style="position:absolute;left:0;right:0;bottom:0;padding:0 40px 36px;background:linear-gradient(transparent,rgba(2,4,8,.82) 55%);z-index:4"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
